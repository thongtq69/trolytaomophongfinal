<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulab - Trợ lý mô phỏng AI</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography,forms"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Segoe+UI:wght@400;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
      background-color: #f8fafc;
      color: #0d2a13;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(166, 222, 175, 0.1);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(166, 222, 175, 0.5);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(166, 222, 175, 0.8);
    }
  </style>

  <style type="text/tailwindcss">
    @layer components {
      .btn-primary {
        @apply bg-sky-600 hover:bg-sky-700 text-white font-black py-5 px-10 rounded-3xl shadow-2xl shadow-sky-600/30 transition-all active:scale-95 uppercase tracking-widest text-xs flex items-center justify-center gap-3;
      }
      .btn-secondary {
        @apply bg-white hover:bg-sky-50 text-sky-600 font-black py-5 px-10 rounded-3xl shadow-xl border-2 border-sky-100 transition-all active:scale-95 uppercase tracking-widest text-xs flex items-center justify-center gap-3;
      }
      .glass-card {
        @apply bg-white/70 backdrop-blur-xl border border-white/40 shadow-2xl;
      }
      .section-container {
        @apply w-full max-w-7xl mx-auto px-4 md:px-8 py-24;
      }
      .heading-xl {
        @apply text-5xl md:text-7xl font-black tracking-tighter leading-[1.1] mb-8;
      }
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#439352', 
              700: '#15803d',
              800: '#166534',
              900: '#14532d',
            }
          }
        }
      }
    }
  </script>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
