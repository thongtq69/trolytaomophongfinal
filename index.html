<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simulab - Trợ lý mô phỏng AI</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography,forms"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', 'Space Grotesk', sans-serif;
      background-color: #fbfcff;
      color: #1a202c;
      overflow-x: hidden;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
    }

    ::-webkit-scrollbar-track {
      background: rgba(14, 165, 233, 0.05);
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(14, 165, 233, 0.2);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(14, 165, 233, 0.4);
    }
  </style>

  <style type="text/tailwindcss">
    @layer components {
      .btn-primary {
         @apply bg-gradient-to-r from-sky-600 to-indigo-600 hover:from-sky-700 hover:to-indigo-700 text-white font-black py-4 px-8 rounded-2xl shadow-xl shadow-sky-600/20 transition-all active:scale-95 uppercase tracking-widest text-xs flex items-center justify-center gap-3;
      }
      .btn-secondary {
        @apply bg-white hover:bg-slate-50 text-slate-800 font-bold py-4 px-8 rounded-2xl shadow-lg border border-slate-100 transition-all active:scale-95 uppercase tracking-widest text-xs flex items-center justify-center gap-3;
      }
      .glass-card {
        @apply bg-white/70 backdrop-blur-2xl border border-white shadow-2xl;
      }
      .section-container {
        @apply w-full max-w-7xl mx-auto px-6 md:px-12 py-24;
      }
      .header-gradient {
        @apply bg-gradient-to-r from-sky-600 via-indigo-600 to-violet-600 bg-clip-text text-transparent;
      }
    }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'Space Grotesk', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              200: '#bae6fd',
              300: '#7dd3fc',
              400: '#38bdf8',
              500: '#0ea5e9',
              600: '#0284c7', // True sky blue
              700: '#0369a1',
              800: '#075985',
              900: '#0c4a6e',
            },
            leaf: {
              50: '#f0fdf4',
              100: '#dcfce7',
              200: '#bbf7d0',
              300: '#86efac',
              400: '#4ade80',
              500: '#22c55e',
              600: '#16a34a',
              700: '#15803d',
              800: '#166534',
              900: '#14532d',
            }
          },
          animation: {
            'float-slow': 'float 6s ease-in-out infinite',
            'pulse-soft': 'pulseSoft 3s ease-in-out infinite',
            'spin-very-slow': 'spin 20s linear infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: 1, transform: 'scale(1)' },
              '50%': { opacity: 0.8, transform: 'scale(0.98)' },
            }
          }
        }
      }
    }
  </script>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.35.0",
    "react": "https://esm.sh/react@^19.2.3",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom/client": "https://esm.sh/react-dom@^19.2.3/client",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
